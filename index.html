<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset QR Generator</title>
    
    <!-- Zoho Official Live SDK -->
    <script>
       var ZOHO={CREATOR:{init:function(){return new Promise(function(e,n){window.addEventListener("message",function(n){if(n.data&&"v1"===n.data.action)e(n.data.data)},!1)})}}};
   </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8fafc; padding: 20px; color: #334155; }
        .container { max-width: 800px; margin: 0 auto; background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .select-box { width: 100%; height: 150px; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; background: #fff; margin-bottom: 15px; }
        .btn { background-color: #2563eb; color: white; border: none; padding: 10px 20px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn:hover { background-color: #1d4ed8; }
        .qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 25px; }
        .qr-card { background: #fff; border: 2px dashed #cbd5e1; padding: 15px; text-align: center; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .qr-card p { margin: 10px 0 0 0; font-size: 12px; font-weight: bold; color: #475569; word-break: break-all; }
        .print-btn { background-color: #059669; margin-left: 10px; }
        .print-btn:hover { background-color: #047857; }
        @media print {
            body * { visibility: hidden; }
            .qr-grid, .qr-grid * { visibility: visible; }
            .qr-grid { position: absolute; left: 0; top: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Asset QR Code Label Generator 🏷️</h2>
    <p>கீழே இருக்கும் பாக்ஸில் தேவையான அசெட்களை செலக்ட் செய்து QR லேபிள்களை உருவாக்குங்கள் (Ctrl அழுத்திப் பிடித்து பல அசெட்களை செலக்ட் செய்யலாம்):</p>
    
    <select id="assetSelector" class="select-box" multiple>
        <option value="">Loading Assets from FanosDesk...</option>
    </select>
    
    <button class="btn" onclick="generateQRLabels()">Generate QR Labels</button>
    <button class="btn print-btn" onclick="window.print()">Print Labels</button>
    
    <div id="qrGrid" class="qr-grid"></div>
</div>

<script>
    // Initialize Zoho Creator Widget with scope configuration
    ZOHO.CREATOR.init({ "scope": "creator" }).then(function(data) {
        console.log("Widget initialized with Creator scope.");
        fetchAssetsFromCreator();
    }).catch(function(err){
        console.error("Initialization error: ", err);
    });

    function fetchAssetsFromCreator() {
        var config = {
            appName : "fanosdesk", // ✅ லிங்க் படி மாற்றப்பட்டது
            reportName : "All_Active_Assets_IT", // ⚠️ ஒருவேளை எர்ரர் வந்தால், உங்க ஒரிஜினல் ரிப்போர்ட் லிங்க் நேமை இங்கே மாத்துங்க
            pageSize : "100"
        };

        ZOHO.CREATOR.API.getAllRecords(config).then(function(response){
            var recordList = response.data;
            var selector = document.getElementById("assetSelector");
            selector.innerHTML = ""; 
            
            if(!recordList || recordList.length === 0) {
                selector.innerHTML = "<option>No assets found in the report.</option>";
                return;
            }

            recordList.forEach(function(record) {
                var option = document.createElement("option");
                
                // ⚠️ உங்க ஃபார்மில் இருக்கும் அக்யூரெட் ஃபீல்டு பெயர்களை (ID மற்றும் Name) இங்கே கொடுக்கவும்
                var assetID = record.Asset_ID || record.ID || "No-ID";
                var assetName = record.Asset_Name || record.Item_Name || "";
                
                option.value = assetID; 
                option.text = assetID + " - " + assetName;
                selector.appendChild(option);
            });
        }).catch(function(error) {
            console.error("Error fetching records: ", error);
            document.getElementById("assetSelector").innerHTML = "<option>Error loading assets. Please check Report/Field Link Names.</option>";
        });
    }

    function generateQRLabels() {
        var selector = document.getElementById("assetSelector");
        var qrGrid = document.getElementById("qrGrid");
        qrGrid.innerHTML = ""; 
        
        var selectedOptions = Array.from(selector.selectedOptions);
        
        if(selectedOptions.length === 0 || selectedOptions[0].value === "") {
            alert("தயவுசெய்து குறைந்தது ஒரு அசெட்டையாவது செலக்ட் பண்ணுங்க!");
            return;
        }

        selectedOptions.forEach(function(option, index) {
            var assetID = option.value;
            
            var qrCard = document.createElement("div");
            qrCard.className = "qr-card";
            
            var qrDiv = document.createElement("div");
            qrDiv.id = "qr_code_" + index;
            qrCard.appendChild(qrDiv);
            
            var labelText = document.createElement("p");
            labelText.innerText = option.text;
            qrCard.appendChild(labelText);
            
            qrGrid.appendChild(qrCard);
            
            new QRCode(document.getElementById("qr_code_" + index), {
                text: assetID,
                width: 128,
                height: 128,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        });
    }
</script>

</body>
</html>
